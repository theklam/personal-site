<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalvin Lam</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 32px 0 24px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .reel-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 130px;
      gap: 0;
    }

    .reel {
      display: flex;
      align-items: center;
      overflow-x: scroll;
      overflow-y: hidden;
      scrollbar-width: none;
      gap: 2px;
      width: 831px;
    }

    .reel::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-track {
      width: 831px;
      height: 8px;
      background: #e0e0e0;
      margin-top: 3px;
      position: relative;
    }

    .scrollbar-thumb {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: #999;
    }

    .sliver {
      flex-shrink: 0;
      width: 48px;
      height: 450px;
      position: relative;
      overflow: hidden;
    }

    .sliver-inner {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .placeholder {
      width: 100%;
      height: 100%;
    }

    /* placeholder colors — swap for real images */
    .sliver:nth-child(3n+1) .placeholder { background: #1a1a1a; }
    .sliver:nth-child(3n+2) .placeholder { background: #2d2d2d; }
    .sliver:nth-child(3n+0) .placeholder { background: #404040; }

    /* overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.active {
      display: flex;
    }

    .overlay-close {
      position: absolute;
      top: 24px;
      right: 28px;
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 20px 40px;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: lowercase;
    }

    nav a {
      color: #000;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <h1>Kalvin Lam</h1>
  </header>

  <div class="reel-wrap">
    <div class="reel" id="reel">
      <!-- slivers will be injected by JS -->
    </div>
    <div class="scrollbar-track" id="scrollbarTrack">
      <div class="scrollbar-thumb" id="scrollbarThumb"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <button class="overlay-close" id="overlayClose">&#x2715;</button>
    <video id="overlayVideo" controls></video>
  </div>

  <nav>
    <a href="#">work</a>
    <a href="#">about</a>
    <a href="#">contact</a>
  </nav>

  <script>
    const videos = [{ src: '', img: 'graduation-album-art.avif' }, ...Array(24).fill({ src: '' })];

    const reel = document.getElementById('reel');
    const overlay = document.getElementById('overlay');
    const overlayVideo = document.getElementById('overlayVideo');
    const overlayClose = document.getElementById('overlayClose');
    const scrollbarThumb = document.getElementById('scrollbarThumb');
    const scrollbarTrack = document.getElementById('scrollbarTrack');

    videos.forEach((v) => {
      const sliver = document.createElement('div');
      sliver.className = 'sliver';
      sliver.innerHTML = `<div class="sliver-inner">${v.img ? `<img src="${v.img}" style="width:100%;height:100%;object-fit:cover;object-position:12%;display:block;">` : '<div class="placeholder"></div>'}</div>`;
      reel.appendChild(sliver);
    });

    function updateScrollbar() {
      const { scrollLeft, scrollWidth, clientWidth } = reel;
      const trackWidth = scrollbarTrack.clientWidth;
      const thumbWidth = (clientWidth / scrollWidth) * trackWidth;
      const thumbLeft = (scrollLeft / scrollWidth) * trackWidth;
      scrollbarThumb.style.width = thumbWidth + 'px';
      scrollbarThumb.style.left = thumbLeft + 'px';
    }

    reel.addEventListener('scroll', updateScrollbar);
    window.addEventListener('resize', updateScrollbar);
    updateScrollbar();

    overlayClose.addEventListener('click', closeOverlay);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeOverlay();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeOverlay();
    });

    function closeOverlay() {
      overlay.classList.remove('active');
      overlayVideo.pause();
      overlayVideo.src = '';
    }
  </script>

</body>
</html>
